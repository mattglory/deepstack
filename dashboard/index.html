<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DeepStack — live metrics</title>
    <style>
      :root { --bg:#0b0e14; --card:#141925; --line:#222a3a; --fg:#e6e9ef; --muted:#8b93a7; --acc:#f5a623; --ok:#3fb950; --bad:#f85149; }
      * { box-sizing: border-box; }
      body { margin:0; background:var(--bg); color:var(--fg); font:14px/1.5 ui-sans-serif,system-ui,-apple-system,sans-serif; }
      .wrap { max-width:980px; margin:0 auto; padding:28px 20px 60px; }
      h1 { font-size:22px; margin:0 0 2px; }
      .sub { color:var(--muted); margin:0 0 20px; }
      .sub a { color:var(--acc); text-decoration:none; }
      .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:22px; }
      .card { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:14px 16px; }
      .card .k { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
      .card .v { font-size:20px; font-weight:600; margin-top:4px; }
      table { width:100%; border-collapse:collapse; background:var(--card); border:1px solid var(--line); border-radius:10px; overflow:hidden; }
      th,td { text-align:left; padding:9px 12px; border-bottom:1px solid var(--line); font-variant-numeric:tabular-nums; }
      th { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
      tr:last-child td { border-bottom:none; }
      td a { color:var(--acc); text-decoration:none; }
      .ok { color:var(--ok); } .bad { color:var(--bad); }
      .foot { color:var(--muted); margin-top:16px; font-size:12px; }
      .pill { font-size:11px; padding:1px 7px; border:1px solid var(--line); border-radius:999px; color:var(--muted); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>DeepStack <span class="pill">live · on-chain</span></h1>
      <p class="sub">
        Bitcoin-native liquidity agent on Stacks ·
        <a id="addrLink" target="_blank" rel="noopener"></a> ·
        <span id="status">loading…</span>
      </p>

      <div class="grid" id="cards"></div>
      <table>
        <thead><tr><th>Time (UTC)</th><th>Action</th><th>Detail</th><th>Fee</th><th>Status</th><th>Tx</th></tr></thead>
        <tbody id="rows"><tr><td colspan="6">loading…</td></tr></tbody>
      </table>
      <p class="foot">
        Every figure is derived live from the Stacks blockchain (Hiro API) and is independently
        verifiable on the explorer. No backend, no private data. Auto-refreshes every 30s.
      </p>
    </div>

    <script>
      const CFG = {
        wallet: "SP23PF43T06AH0BA2XD7XYKH16GECH242S238WK60",
        api: "https://api.mainnet.hiro.so",
        sbtcAsset: "SM3VDXK3WZZSA84XXFKAFAF15NNZX32CTSG82JFQ4.sbtc-token::sbtc-token",
        actions: ["swap-y-for-x", "swap-x-for-y", "add-liquidity", "withdraw-liquidity"],
      };
      const uSTX = (n) => Number(n) / 1e6;
      const baseBTC = (n) => Number(n) / 1e8;
      const fmt = (n, d = 2) => Number(n).toLocaleString("en-US", { maximumFractionDigits: d });
      const explorer = (txid) => `https://explorer.hiro.so/txid/${txid}?chain=mainnet`;

      async function getJson(path) {
        const r = await fetch(CFG.api + path);
        if (!r.ok) throw new Error(path + " → " + r.status);
        return r.json();
      }

      function sbtcLeg(t) {
        const ft = (t.ft_transfers || []).find((f) => f.asset_identifier === CFG.sbtcAsset);
        return ft ? Number(ft.amount) : 0; // base units
      }

      function render(balances, txs) {
        // balances
        const stx = uSTX(balances.stx?.balance ?? 0);
        const sbtc = baseBTC(balances.fungible_tokens?.[CFG.sbtcAsset]?.balance ?? 0);

        // filter DeepStack actions
        const acts = txs.filter(
          (r) => r.tx?.tx_type === "contract_call" && CFG.actions.includes(r.tx.contract_call?.function_name),
        );
        let volumeStx = 0, sbtcTraded = 0, fees = 0, ok = 0, aborts = 0, swaps = 0, lpOps = 0;
        let impliedMid = 0, lastTs = 0;
        for (const r of acts) {
          const fn = r.tx.contract_call.function_name;
          const success = r.tx.tx_status === "success";
          fees += Number(r.tx.fee_rate || 0);
          if (success) ok++; else aborts++;
          lastTs = Math.max(lastTs, (r.tx.burn_block_time || 0));
          const sb = sbtcLeg(r);
          if (fn.startsWith("swap")) {
            swaps++;
            if (success) {
              sbtcTraded += sb;
              const legStx = fn === "swap-y-for-x"
                ? Number(r.stx_sent || 0) - Number(r.tx.fee_rate || 0)
                : Number(r.stx_received || 0);
              volumeStx += Math.max(0, legStx);
              if (sb > 0 && legStx > 0) impliedMid = uSTX(legStx) / baseBTC(sb);
            }
          } else lpOps++;
        }
        const portfolioStx = stx + (impliedMid ? sbtc * impliedMid : 0);

        const cards = [
          ["STX balance", fmt(stx, 4)],
          ["sBTC balance", fmt(sbtc, 8)],
          ["Portfolio (STX-eq)", impliedMid ? fmt(portfolioStx, 1) : "—"],
          ["Volume facilitated", fmt(uSTX(volumeStx), 2) + " STX"],
          ["sBTC traded", fmt(baseBTC(sbtcTraded), 8)],
          ["Network fees", fmt(uSTX(fees), 3) + " STX"],
          ["Actions", `${acts.length} (${swaps} swap / ${lpOps} LP)`],
          ["Success / abort", `${ok} / ${aborts}`],
          ["Last active", lastTs ? new Date(lastTs * 1000).toISOString().slice(0, 16).replace("T", " ") : "—"],
        ];
        document.getElementById("cards").innerHTML = cards
          .map(([k, v]) => `<div class="card"><div class="k">${k}</div><div class="v">${v}</div></div>`)
          .join("");

        document.getElementById("rows").innerHTML = acts.length
          ? acts.slice(0, 25).map((r) => {
              const t = r.tx, fn = t.contract_call.function_name;
              const sb = sbtcLeg(r);
              const detail = fn === "swap-y-for-x"
                ? `${fmt(uSTX(Number(r.stx_sent) - Number(t.fee_rate)), 3)} STX → ${fmt(baseBTC(sb), 8)} sBTC`
                : fn === "swap-x-for-y"
                ? `${fmt(baseBTC(sb), 8)} sBTC → ${fmt(uSTX(r.stx_received), 3)} STX`
                : fn;
              const time = t.burn_block_time ? new Date(t.burn_block_time * 1000).toISOString().slice(0, 16).replace("T", " ") : "—";
              const ok = t.tx_status === "success";
              return `<tr><td>${time}</td><td>${fn}</td><td>${detail}</td><td>${fmt(uSTX(t.fee_rate), 3)}</td>
                <td class="${ok ? "ok" : "bad"}">${ok ? "success" : t.tx_status}</td>
                <td><a href="${explorer(t.tx_id)}" target="_blank" rel="noopener">${t.tx_id.slice(0, 8)}…</a></td></tr>`;
            }).join("")
          : `<tr><td colspan="6">no DeepStack transactions yet</td></tr>`;
      }

      async function load() {
        try {
          const a = CFG.wallet;
          document.getElementById("addrLink").textContent = a.slice(0, 8) + "…" + a.slice(-4);
          document.getElementById("addrLink").href = `https://explorer.hiro.so/address/${a}?chain=mainnet`;
          const [bal, tt] = await Promise.all([
            getJson(`/extended/v1/address/${a}/balances`),
            getJson(`/extended/v1/address/${a}/transactions_with_transfers?limit=50`),
          ]);
          render(bal, tt.results || []);
          document.getElementById("status").textContent = "updated " + new Date().toUTCString().slice(17, 25) + " UTC";
        } catch (e) {
          document.getElementById("status").textContent = "error: " + e.message;
        }
      }
      load();
      setInterval(load, 30000);
    </script>
  </body>
</html>
